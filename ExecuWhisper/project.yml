name: ExecuWhisper
options:
  bundleIdPrefix: org.pytorch.executorch
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    DEAD_CODE_STRIPPING: YES
    # Our post-compile script copies helpers from outside the build dir
    # (parakeet_helper / lfm25_formatter_helper) and runs codesign / install_name_tool.
    # User script sandboxing would block those reads. Keep it explicitly off.
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES

schemes:
  ExecuWhisper:
    build:
      targets:
        ExecuWhisper: all
        ExecuWhisperTests: [test]
    run:
      environmentVariables:
        EXECUTORCH_PATH: /Users/younghan/executorch
        PARAKEET_HELPER_PATH: /Users/younghan/project/executorch/cmake-out/examples/models/parakeet/parakeet_helper
        FORMATTER_HELPER_PATH: /Users/younghan/executorch/cmake-out/examples/models/llama/lfm25_formatter_helper
    test:
      gatherCoverageData: true
      targets:
        - ExecuWhisperTests

targets:
  ExecuWhisper:
    type: application
    platform: macOS
    sources:
      - path: ExecuWhisper
        excludes:
          - "Resources/**"
          - "Support/PasteHelper/**"
      - path: ExecuWhisper/Resources/Assets.xcassets
      - path: ExecuWhisper/Resources/model_manifest.json
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.pytorch.executorch.ExecuWhisper
        PRODUCT_NAME: ExecuWhisper
        INFOPLIST_FILE: ExecuWhisper/Info.plist
        CODE_SIGN_ENTITLEMENTS: ExecuWhisper/ExecuWhisper.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: XSDG2DKA58
        EXECUTORCH_PATH: /Users/younghan/executorch
        PARAKEET_HELPER_PATH: /Users/younghan/project/executorch/cmake-out/examples/models/parakeet/parakeet_helper
        FORMATTER_HELPER_PATH: /Users/younghan/executorch/cmake-out/examples/models/llama/lfm25_formatter_helper
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "ExecuWhisper needs microphone access to record audio for on-device transcription."
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    entitlements:
      path: ExecuWhisper/ExecuWhisper.entitlements
      properties:
        com.apple.security.cs.disable-library-validation: true
        com.apple.security.device.audio-input: true
        com.apple.security.network.client: true
    postCompileScripts:
      - script: |
          set -euo pipefail

          ET_PATH="${EXECUTORCH_PATH:-${HOME}/executorch}"
          HELPER_SRC="${PARAKEET_HELPER_PATH:-${ET_PATH}/cmake-out/examples/models/parakeet/parakeet_helper}"
          FORMATTER_HELPER_SRC="${FORMATTER_HELPER_PATH:-${ET_PATH}/cmake-out/examples/models/llama/lfm25_formatter_helper}"
          MLX_METALLIB_SRC="${FORMATTER_METALLIB_PATH:-$(dirname "${FORMATTER_HELPER_SRC}")/mlx.metallib}"
          MODEL_DIR="${MODEL_DIR:-${HOME}/parakeet_metal}"
          FORMATTER_MODEL_DIR="${FORMATTER_MODEL_DIR:-${HOME}/lfm2_5_mlx}"
          BUNDLE_MODEL_ARTIFACTS="${BUNDLE_MODEL_ARTIFACTS:-0}"
          LIBOMP_HOMEBREW="/opt/homebrew/opt/libomp/lib/libomp.dylib"
          LIBOMP_LLVM="/opt/llvm-openmp/lib/libomp.dylib"
          DEST="${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources"

          mkdir -p "${DEST}"

          resolve_libomp() {
            if [ -f "${LIBOMP_HOMEBREW}" ]; then
              echo "${LIBOMP_HOMEBREW}"
            elif [ -f "${LIBOMP_LLVM}" ]; then
              echo "${LIBOMP_LLVM}"
            fi
          }

          copy_if_newer() {
            local src="$1" dst="$2"
            if [ ! -f "${src}" ]; then
              echo "warning: Not found: ${src}"
              return
            fi
            if [ ! -f "${dst}" ] || [ "${src}" -nt "${dst}" ]; then
              cp -fL "${src}" "${dst}"
              echo "Bundled $(basename "${dst}")"
            fi
          }

          copy_if_newer "${HELPER_SRC}" "${DEST}/parakeet_helper"
          chmod +x "${DEST}/parakeet_helper" 2>/dev/null || true
          copy_if_newer "${FORMATTER_HELPER_SRC}" "${DEST}/lfm25_formatter_helper"
          chmod +x "${DEST}/lfm25_formatter_helper" 2>/dev/null || true
          copy_if_newer "${MLX_METALLIB_SRC}" "${DEST}/mlx.metallib"
          PASTE_HELPER_APP="${DEST}/ExecuWhisper Paste Helper.app"
          PASTE_HELPER_CONTENTS="${PASTE_HELPER_APP}/Contents"
          PASTE_HELPER_MACOS="${PASTE_HELPER_CONTENTS}/MacOS"
          mkdir -p "${PASTE_HELPER_MACOS}"
          xcrun swiftc "${PROJECT_DIR}/ExecuWhisper/Support/PasteHelper/main.swift" -o "${PASTE_HELPER_MACOS}/execuwhisper_paste_helper"
          chmod +x "${PASTE_HELPER_MACOS}/execuwhisper_paste_helper" 2>/dev/null || true
          cat > "${PASTE_HELPER_CONTENTS}/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>execuwhisper_paste_helper</string>
            <key>CFBundleIdentifier</key>
            <string>org.pytorch.executorch.ExecuWhisper.PasteHelper</string>
            <key>CFBundleName</key>
            <string>ExecuWhisper Paste Helper</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>3</string>
            <key>LSBackgroundOnly</key>
            <true/>
          </dict>
          </plist>
          PLIST
          codesign --force --sign - --identifier "org.pytorch.executorch.ExecuWhisper.PasteHelper" "${PASTE_HELPER_APP}" 2>/dev/null || true
          rm -f "${DEST}/parakeet_runner"

          LIBOMP_SRC="$(resolve_libomp)"
          if [ -n "${LIBOMP_SRC:-}" ]; then
            copy_if_newer "${LIBOMP_SRC}" "${DEST}/libomp.dylib"
          else
            echo "warning: libomp.dylib not found in expected locations"
          fi

          # libc++ is provided by the macOS dyld shared cache; we no longer bundle it.
          rm -f "${DEST}/libc++.1.dylib" 2>/dev/null || true

          if [ "${BUNDLE_MODEL_ARTIFACTS}" = "1" ]; then
            copy_if_newer "$MODEL_DIR/model.pte" "${DEST}/model.pte"
            copy_if_newer "$MODEL_DIR/tokenizer.model" "${DEST}/tokenizer.model"
            copy_if_newer "$FORMATTER_MODEL_DIR/lfm2_5_350m_mlx_4w.pte" "${DEST}/lfm2_5_350m_mlx_4w.pte"
            copy_if_newer "$FORMATTER_MODEL_DIR/tokenizer.json" "${DEST}/tokenizer.json"
            copy_if_newer "$FORMATTER_MODEL_DIR/tokenizer_config.json" "${DEST}/tokenizer_config.json"
          else
            rm -f "${DEST}/model.pte" "${DEST}/tokenizer.model" "${DEST}/lfm2_5_350m_mlx_4w.pte" "${DEST}/tokenizer.json" "${DEST}/tokenizer_config.json"
          fi

          if [ -f "${DEST}/parakeet_helper" ] && [ -f "${DEST}/libomp.dylib" ]; then
            install_name_tool -change /opt/homebrew/opt/libomp/lib/libomp.dylib @executable_path/libomp.dylib "${DEST}/parakeet_helper" 2>/dev/null || true
            install_name_tool -change /opt/llvm-openmp/lib/libomp.dylib @executable_path/libomp.dylib "${DEST}/parakeet_helper" 2>/dev/null || true
            install_name_tool -add_rpath @executable_path "${DEST}/parakeet_helper" 2>/dev/null || true
            install_name_tool -add_rpath /usr/lib "${DEST}/parakeet_helper" 2>/dev/null || true
          fi

          if [ -f "${DEST}/lfm25_formatter_helper" ] && [ -f "${DEST}/libomp.dylib" ]; then
            install_name_tool -change /opt/homebrew/opt/libomp/lib/libomp.dylib @executable_path/libomp.dylib "${DEST}/lfm25_formatter_helper" 2>/dev/null || true
            install_name_tool -change /opt/llvm-openmp/lib/libomp.dylib @executable_path/libomp.dylib "${DEST}/lfm25_formatter_helper" 2>/dev/null || true
            install_name_tool -add_rpath @executable_path "${DEST}/lfm25_formatter_helper" 2>/dev/null || true
            install_name_tool -add_rpath /usr/lib "${DEST}/lfm25_formatter_helper" 2>/dev/null || true
          fi

        name: Bundle Helper and Model Artifacts
        basedOnDependencyAnalysis: false
  ExecuWhisperTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ExecuWhisper/Models/DictationShortcut.swift
      - path: ExecuWhisper/Models/Preferences.swift
      - path: ExecuWhisper/Models/ReplacementEntry.swift
      - path: ExecuWhisper/Models/Session.swift
      - path: ExecuWhisper/Models/TranscriptStore.swift
      - path: ExecuWhisper/Utilities/PersistencePaths.swift
      - path: ExecuWhisper/Utilities/SessionHistory.swift
      - path: ExecuWhisper/Utilities/SessionExportFormat.swift
      - path: ExecuWhisper/Utilities/RunnerError.swift
      - path: ExecuWhisper/Utilities/DiagnosticLogging.swift
      - path: ExecuWhisper/Services/AudioRecorder.swift
      - path: ExecuWhisper/Services/DictationManager.swift
      - path: ExecuWhisper/Services/FormatterBridge.swift
      - path: ExecuWhisper/Services/FormatterHelperProtocol.swift
      - path: ExecuWhisper/Services/GlobalHotKeyManager.swift
      - path: ExecuWhisper/Services/HealthCheck.swift
      - path: ExecuWhisper/Services/ImportedAudioDecoder.swift
      - path: ExecuWhisper/Services/FormatterPromptBuilder.swift
      - path: ExecuWhisper/Services/ModelDownloader.swift
      - path: ExecuWhisper/Services/ParakeetHelperProtocol.swift
      - path: ExecuWhisper/Services/PasteController.swift
      - path: ExecuWhisper/Services/ReplacementStore.swift
      - path: ExecuWhisper/Services/RunnerBridge.swift
      - path: ExecuWhisper/Services/TextPipeline.swift
      - path: ExecuWhisper/Views/AudioLevelView.swift
      - path: ExecuWhisper/Views/DictationOverlayView.swift
      - path: ExecuWhisper/Views/DictationPanel.swift
      - path: ExecuWhisperTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.pytorch.executorch.ExecuWhisperTests
        GENERATE_INFOPLIST_FILE: YES
